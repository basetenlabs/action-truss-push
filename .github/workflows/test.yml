name: Test Action

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

  test-model:
    name: Test model push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          truss-directory: ".github/tests/model"
          baseten-api-key: ${{ secrets.BASETEN_API_KEY }}
          cleanup: true
          deploy-timeout-minutes: 45

  test-chain:
    name: Test chain push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          truss-directory: ".github/tests/chain/hello_chain.py"
          baseten-api-key: ${{ secrets.BASETEN_API_KEY }}
          cleanup: true
          predict-payload: '{"max_value": 5}'
          deploy-timeout-minutes: 45
